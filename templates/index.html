<!DOCTYPE html>
<html>
<head>
<title>AI Resume Analyzer</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:600px;
    border-radius:10px;
    box-shadow:0px 4px 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

textarea{
    width:100%;
    height:150px;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

input[type=file]{
    margin-bottom:10px;
}

button{
    width:100%;
    padding:12px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:20px;
    background:#f1f3f5;
    padding:15px;
    border-radius:6px;
    white-space:pre-wrap;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Resume Analyzer</h1>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="resume_file" accept=".pdf">

<br><br>

<textarea name="resume_text" placeholder="Paste your resume here"></textarea>

<br><br>

<button type="submit">Analyze Resume</button>

</form>

{% if result %}

<div class="result">

<h3>Analysis Result</h3>

<p>{{ result }}</p>

</div>

{% endif %}

</div>

</body>
</html>
